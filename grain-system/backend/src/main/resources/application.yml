server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: grain-system
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/grain_purchase_inventory_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: yuan1996@
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.grain.system.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MinIO配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: grain-system
  url-expire-hours: 2

# JWT配置
jwt:
  secret: grain-system-jwt-secret-key-2026-very-long-key-for-hs256
  expire-hours: 8

# 日志
logging:
  level:
    com.grain.system: debug
    com.grain.system.module.*.mapper: debug

# Knife4j文档
knife4j:
  enable: true
  setting:
    language: zh_cn
